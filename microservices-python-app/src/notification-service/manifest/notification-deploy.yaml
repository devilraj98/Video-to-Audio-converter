apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification
  labels:
    app: notification
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 8
  template:
    metadata:
      labels:
        app: notification
    spec:
      containers:
        - name: notification
          image: 754307962192.dkr.ecr.ap-south-1.amazonaws.com/notification-service:latest
          envFrom:
            - configMapRef:
                name: notification-configmap
            - secretRef:
                name: notification-secret
