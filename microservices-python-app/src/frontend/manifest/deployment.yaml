apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 754307962192.dkr.ecr.ap-south-1.amazonaws.com/frontend:latest
          ports:
            - containerPort: 5000
          env:
            - name: GATEWAY_URL
              value: "http://gateway:8080"
